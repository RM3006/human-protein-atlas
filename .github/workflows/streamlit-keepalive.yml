name: Streamlit keep-alive

on:
  schedule:
    - cron: "0 */11 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          curl --fail --silent --show-error \
            https://human-protein-atlas-cqhrelt2uatfzhyt54udys.streamlit.app/healthz
