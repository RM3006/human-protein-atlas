name: Keep app alive

# Loads the Streamlit app in headless Chromium twice a week.
# A plain HTTP ping to /healthz doesn't count as activity — Streamlit Community
# Cloud tracks WebSocket sessions (real browser connections). Playwright
# establishes one, which resets the ~7-day inactivity sleep timer.

on:
  schedule:
    - cron: "0 */10 * * *"  # every 10 hours
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: pip install playwright

      - name: Install Chromium
        run: playwright install --with-deps chromium

      - name: Load Streamlit app
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright

          APP_URL = "https://human-protein-atlas-cqhrelt2uatfzhyt54udys.streamlit.app/"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto(APP_URL, wait_until="load", timeout=60000)
              page.wait_for_timeout(5000)  # give the WebSocket time to connect
              print(f"loaded: {page.title()}")
              browser.close()
          EOF
