name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ruff + pyright + pytest
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Pyright (strict)
        run: uv run pyright

      - name: Pytest
        run: uv run pytest

  dbt:
    name: dbt compile + unit tests
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: dbt parse (compile gate)
        run: uv run dbt parse --project-dir models --profiles-dir models --target ci

      - name: dbt build (unit tests on Bronze stubs)
        # Builds every model from zero-row fixture Parquet, then runs all tests.
        # Tests tagged real_data (volume + cardinality guards) require the live
        # warehouse and run in the weekly dbt-prod workflow instead.
        run: >
          uv run dbt build
          --project-dir models
          --profiles-dir models
          --target ci
          --vars '{"source_root": "models/fixtures/bronze"}'
          --exclude tag:real_data
