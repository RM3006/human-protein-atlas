version: 2

models:
  - name: dim_protein
    description: "One row per reviewed human protein. Anchor table; every fact table joins here."
    columns:
      - name: uniprot_accession
        description: "UniProt primary accession — primary key."
        tests:
          - unique
          - not_null
      - name: protein_name
        tests:
          - not_null
      - name: sequence
        tests:
          - not_null
      - name: function_friendly
        description: "Plain-English rewrite of function_raw — editorial > LLM > raw > 'No information available', via COALESCE. Never NULL by construction; pinned here so a future COALESCE edit can't silently reintroduce nulls into the UI."
        tests:
          - not_null
      - name: tagline
        description: "One-sentence memorable description — editorial > LLM > 'No information available', via COALESCE. Never NULL by construction; pinned here so a future COALESCE edit can't silently reintroduce nulls into the UI."
        tests:
          - not_null
      - name: is_curated
        description: "TRUE for the 100 hand-authored proteins in the editorial seed."

  - name: dim_disease
    description: "One row per EFO disease term from Open Targets."
    columns:
      - name: efo_id
        description: "EFO disease ID — primary key."
        tests:
          - unique
          - not_null
      - name: disease_name
        tests:
          - not_null

  - name: dim_drug
    description: "One row per ChEMBL drug that appears in clinical_target associations."
    columns:
      - name: chembl_id
        description: "ChEMBL molecule ID — primary key."
        tests:
          - unique
          - not_null

  - name: fact_protein_tissue
    description: "HPA tissue expression summary, one row per protein."
    columns:
      - name: uniprot_accession
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_protein')
                field: uniprot_accession

  - name: fact_interaction
    description: "STRING-DB high-confidence interactions, limited to Swiss-Prot human proteins."
    columns:
      - name: uniprot_a
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_protein')
                field: uniprot_accession
      - name: uniprot_b
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_protein')
                field: uniprot_accession
      - name: combined_score
        tests:
          - not_null

  - name: fact_protein_disease
    description: "Open Targets gene-disease scores for human proteins."
    columns:
      - name: uniprot_accession
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_protein')
                field: uniprot_accession
      - name: efo_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_disease')
                field: efo_id
      - name: overall_score
        tests:
          - not_null

  - name: fact_drug_target_disease
    description: "Drug-target-disease triples from Open Targets clinical_target."
    columns:
      - name: chembl_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_drug')
                field: chembl_id
      - name: uniprot_accession
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_protein')
                field: uniprot_accession
      - name: efo_id
        description: "EFO/MONDO/... disease ID extracted from the diseases STRUCT list. NULL where the source struct's diseaseId is absent — not invented (CLAUDE.md rule 5)."
        tests:
          - relationships:
              arguments:
                to: ref('dim_disease')
                field: efo_id
