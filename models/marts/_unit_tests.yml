version: 2

unit_tests:
  - name: test_fact_interaction_dedup
    description: >
      fact_interaction must collapse symmetric STRING pairs (A-B and B-A) into one
      canonical row with LEAST/GREATEST ordering and MAX(combined_score), and must
      drop self-loops (A-A). Three input rows produce exactly one output row.
    model: fact_interaction
    given:
      - input: ref('stg_string')
        rows:
          # symmetric pair — both directions present, different scores
          - {uniprot_a: "P01308", uniprot_b: "P06213", combined_score: 800}
          - {uniprot_a: "P06213", uniprot_b: "P01308", combined_score: 900}
          # self-loop — must be dropped
          - {uniprot_a: "P01308", uniprot_b: "P01308", combined_score: 750}
      - input: ref('dim_protein')
        rows:
          - {uniprot_accession: "P01308"}
          - {uniprot_accession: "P06213"}
    expect:
      rows:
        # P01308 < P06213 alphabetically → canonical order; MAX score wins
        - {uniprot_a: "P01308", uniprot_b: "P06213", combined_score: 900}

  - name: test_fact_protein_disease_floor
    description: >
      fact_protein_disease applies a HAVING MAX(overall_score) >= 0.1 floor to drop
      low-evidence associations. A score of 0.09 must be excluded; 0.10 and 0.50
      must be included.
    model: fact_protein_disease
    given:
      - input: ref('stg_ot_associations')
        rows:
          - {ensembl_gene_id: "ENS1", efo_id: "EFO_001", overall_score: 0.09}
          - {ensembl_gene_id: "ENS1", efo_id: "EFO_002", overall_score: 0.10}
          - {ensembl_gene_id: "ENS1", efo_id: "EFO_003", overall_score: 0.50}
      - input: ref('stg_ot_targets')
        rows:
          - {ensembl_gene_id: "ENS1", uniprot_accession: "P01308"}
      - input: ref('dim_protein')
        rows:
          - {uniprot_accession: "P01308"}
      - input: ref('dim_disease')
        rows:
          - {efo_id: "EFO_001"}
          - {efo_id: "EFO_002"}
          - {efo_id: "EFO_003"}
    expect:
      rows:
        - {uniprot_accession: "P01308", efo_id: "EFO_002", overall_score: 0.10}
        - {uniprot_accession: "P01308", efo_id: "EFO_003", overall_score: 0.50}

  - name: test_aa_composition_hand_counted
    description: >
      Hand-counted fixture for fact_protein_aa_composition. Sequence 'ACDACA'
      (length 6) has A x3 (50%), C x2 (33.33%), D x1 (16.67%); every other
      standard amino acid is 0. Verifies the per-letter count arithmetic, the
      UNPIVOT to 20 rows per protein, and the pct_of_sequence rounding.
    model: fact_protein_aa_composition
    given:
      - input: ref('dim_protein')
        rows:
          - {uniprot_accession: "TEST1", sequence: "ACDACA", sequence_length: 6}
      - input: ref('seed_amino_acids')
        rows:
          - {amino_acid_code: "A"}
          - {amino_acid_code: "R"}
          - {amino_acid_code: "N"}
          - {amino_acid_code: "D"}
          - {amino_acid_code: "C"}
          - {amino_acid_code: "E"}
          - {amino_acid_code: "Q"}
          - {amino_acid_code: "G"}
          - {amino_acid_code: "H"}
          - {amino_acid_code: "I"}
          - {amino_acid_code: "L"}
          - {amino_acid_code: "K"}
          - {amino_acid_code: "M"}
          - {amino_acid_code: "F"}
          - {amino_acid_code: "P"}
          - {amino_acid_code: "S"}
          - {amino_acid_code: "T"}
          - {amino_acid_code: "W"}
          - {amino_acid_code: "Y"}
          - {amino_acid_code: "V"}
    expect:
      rows:
        - {uniprot_accession: "TEST1", amino_acid_code: "A", count: 3, pct_of_sequence: 50.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "C", count: 2, pct_of_sequence: 33.33}
        - {uniprot_accession: "TEST1", amino_acid_code: "D", count: 1, pct_of_sequence: 16.67}
        - {uniprot_accession: "TEST1", amino_acid_code: "R", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "N", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "E", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "Q", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "G", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "H", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "I", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "L", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "K", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "M", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "F", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "P", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "S", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "T", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "W", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "Y", count: 0, pct_of_sequence: 0.0}
        - {uniprot_accession: "TEST1", amino_acid_code: "V", count: 0, pct_of_sequence: 0.0}
