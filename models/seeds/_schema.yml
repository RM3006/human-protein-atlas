version: 2

seeds:
  - name: dim_protein_editorial
    description: >
      Hand-curated editorial content for the top 100 famous human proteins.
      tagline and function_friendly are authored in docs/protein_atlas_curation_list.md.
      Generate this file by running: python notebooks/generate_editorial_seed.py
    config:
      column_types:
        uniprot_accession: varchar
        tagline: varchar
        function_friendly: varchar
        is_curated: boolean
    columns:
      - name: uniprot_accession
        description: "UniProt primary accession — join key."
        tests:
          - unique
          - not_null
      - name: tagline
        description: "One-sentence memorable description; pre-written from the curation list."
        tests:
          - not_null
      - name: function_friendly
        description: "Plain-English narrative; authored in docs/protein_atlas_curation_list.md."
      - name: is_curated
        description: "Always TRUE for seed entries."
        tests:
          - not_null

  - name: family_group_map
    description: >
      Priority-ordered mapping from HPA protein_class tokens to coarse family_group
      buckets used as the atlas map color dimension. A protein's protein_class string
      is comma-multi-label; dim_protein explodes it and picks the lowest-priority
      (most specific functional family) match, so e.g. Enzymes wins over the generic
      Predicted intracellular/membrane/secreted localization tokens. Annotation-flag
      tokens (Disease related, Cancer-related, drug-target flags, ...) are deliberately
      unmapped and fall through to localization or 'Unclassified'.
    config:
      column_types:
        protein_class_token: varchar
        family_group: varchar
        priority: integer
    columns:
      - name: protein_class_token
        description: "Exact HPA protein_class token (one comma-split value), the join key."
        tests:
          - unique
          - not_null
      - name: family_group
        description: "Coarse family bucket shown on the atlas legend."
        tests:
          - not_null
      - name: priority
        description: "Lower number wins when a protein matches multiple tokens."
        tests:
          - not_null
