# dbt connection profile for the Protein Atlas warehouse.
# Credentials come from .env.local (CLAUDE.md rule 2: no secrets in code).
# Run dbt from the models/ directory: cd models && dbt run
# Or from project root: dbt run --project-dir models --profiles-dir models

atlas:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "md:atlas?motherduck_token={{ env_var('MOTHERDUCK_TOKEN') }}"
      schema: main
      threads: 4
      extensions:
        - httpfs
    ci:
      type: duckdb
      path: ":memory:"
      schema: main
      threads: 4
    docs:
      # File-based (not :memory:) so `dbt build` and `dbt docs generate` — separate
      # CLI invocations in the docs-publish workflow — share the same materialized
      # relations; :memory: would reset between commands and produce an empty catalog.
      type: duckdb
      path: "docs_build.duckdb"
      schema: main
      threads: 4
